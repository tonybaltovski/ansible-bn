---
- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - uidmap
      - dbus-user-session
      - slirp4netns
      - fuse-overlayfs
    state: present

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
      - docker-ce-rootless-extras
    state: present
    update_cache: true

- name: Disable system-wide Docker daemon
  ansible.builtin.systemd:
    name: docker
    enabled: false
    state: stopped

- name: Disable system-wide containerd
  ansible.builtin.systemd:
    name: containerd
    enabled: false
    state: stopped

- name: Configure rootless Docker for each user
  ansible.builtin.include_tasks: rootless-user.yml
  loop: "{{ docker_users }}"
  loop_control:
    loop_var: docker_user
  when: docker_users | length > 0
