---
- name: Install ROS 2 prerequisites
  ansible.builtin.apt:
    name:
      - software-properties-common
      - curl
    state: present

- name: Add ROS 2 GPG key
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/ros/rosdistro/master/ros.asc
    dest: /etc/apt/keyrings/ros-archive-keyring.gpg
    mode: "0644"

- name: Add ROS 2 repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ros_arch }} signed-by=/etc/apt/keyrings/ros-archive-keyring.gpg]
      http://packages.ros.org/ros2/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} main
    filename: ros2
    state: present

- name: Install ROS 2 {{ ros_distro }} {{ ros_package_type }}
  ansible.builtin.apt:
    name: "ros-{{ ros_distro }}-{{ ros_package_type }}"
    state: present
    update_cache: true

- name: Install ROS 2 dev tools
  ansible.builtin.apt:
    name:
      - python3-colcon-common-extensions
      - python3-rosdep
      - python3-vcstool
    state: present

- name: Install extra ROS 2 packages
  ansible.builtin.apt:
    name: "ros-{{ ros_distro }}-{{ item }}"
    state: present
  loop: "{{ ros_extra_packages }}"
  when: ros_extra_packages | length > 0

- name: Initialize rosdep
  ansible.builtin.command:
    cmd: rosdep init
    creates: /etc/ros/rosdep/sources.list.d/20-default.list
